        run: pnpm install --frozen-lockfile

      - name: Setup GodotJS Toolchain
        env:
          GODOTJS_RELEASE_TAG: v1.1.0.beta1-4.6.1
          GODOTJS_EDITOR_ARCHIVE_URL: https://github.com/godotjs/GodotJS/releases/download/v1.1.0.beta1-4.6.1/linux-editor-4.6.1-v8.zip
          GODOTJS_EDITOR_ARCHIVE_SHA256: 6dd3aa8f27210111052038b35c092f804f8218405ca50edf70a0a83864e38375
          GODOTJS_TEMPLATE_DEBUG_ARCHIVE_URL: https://github.com/godotjs/GodotJS/releases/download/v1.1.0.beta1-4.6.1/web-dlink-template_debug-4.6.1-browser.zip
          GODOTJS_TEMPLATE_DEBUG_ARCHIVE_SHA256: be70a392ea31060c48a891e2907816470c057c3ce9d1eca54a2ad9621651ed94
          GODOTJS_TEMPLATE_RELEASE_ARCHIVE_URL: https://github.com/godotjs/GodotJS/releases/download/v1.1.0.beta1-4.6.1/web-dlink-template_release-4.6.1-browser.zip
          GODOTJS_TEMPLATE_RELEASE_ARCHIVE_SHA256: 5b2228b7d4a0a912fb4791db6d46bf03dabb1ac4b8127168df97c6e831f9b0b0
          GODOT_EXPORT_TEMPLATES_VERSION: 4.6.1.stable
        run: bash tests/ci/setup-godotjs.sh

      - name: Show Godot Version
        run: |
          "$GODOT" --version

      - name: Ensure WPT hosts mapping
        run: |
          python3 tests/wpt-upstream/wpt.py make-hosts-file > /tmp/wpt-hosts.txt
          python3 - <<'PY'
          from pathlib import Path
          import subprocess

          hosts_path = Path("/etc/hosts")
