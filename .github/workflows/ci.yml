          existing = hosts_path.read_text(encoding="utf-8").splitlines()
          existing_set = {line.strip() for line in existing if line.strip()}
          missing = [line for line in generated if line.strip() and line.strip() not in existing_set]
          if not missing:
              print("WPT hosts mapping already present")
          else:
              payload = "\n".join(missing) + "\n"
              subprocess.run(
                  ["sudo", "tee", "-a", str(hosts_path)],
                  input=payload.encode("utf-8"),
                  check=True,
              )
              print(f"Added {len(missing)} WPT host mappings")
          PY

      - name: Verify WPT hosts mapping
        run: |
          python3 - <<'PY'
          import socket, sys
          required = ["web-platform.test", "www.web-platform.test", "www2.web-platform.test", "not-web-platform.test"]
          missing = []
          for host in required:
              try:
                  ip = socket.gethostbyname(host)
              except Exception:
                  missing.append(host)
                  continue
              if ip != "127.0.0.1":
                  missing.append(f"{host} -> {ip}")
          if missing:
              print("Missing/invalid hosts mapping:", ", ".join(missing))
              sys.exit(1)
          PY

      - name: Build
        run: pnpm build

      - name: Build Demo Scripts
        run: pnpm -C demo run build

      - name: Install Chrome For Puppeteer
        run: pnpm exec puppeteer browsers install chrome

      - name: Web Smoke Tests
        run: |
          pnpm -C demo run test:http:web
          pnpm -C demo run test:stream:web
          pnpm -C demo run test:bridge:web

  web-browser-wpt:
    name: Web Browser WPT
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_web_wpt == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: [checks, web-smoke]
    env:
      WPT_HOST: web-platform.test
      WPT_DOMAIN_WWW: www.web-platform.test
      WPT_DOMAIN_WWW2: www2.web-platform.test
      WPT_WEB_FETCH_IMPLEMENTATION: browser
      GODOT_FETCH_MODE: conformant
